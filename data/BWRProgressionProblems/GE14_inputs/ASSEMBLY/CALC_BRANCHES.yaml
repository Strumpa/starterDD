# Yaml config file to define the branch calculations :
# The branches can be used to tabulate dragon5 cross sections in varying conditions
# Supported variations are : colant density, fuel temperature, coolant temperature, & burnup (for depletion branches)
# R.Guasch
# Date : 10/03/2026 [created]

CALCULATION_BRANCHES:
  - name: "Coolant density variation"
    type: "coolant_density"
    # Reference : BWR Progression Problem for GE14, Table 2 "Coolant density as a fuinction of void"
    #        0%            20%           40%         60%         80%
    values: [0.73669000, 0.59685660, 0.45702320, 0.31718980, 0.17735640] # in g/cm3
  - name: "Fuel temperature variation"
    type: "fuel_temperature"
    values: [900.0]
  - name: "Coolant temperature variation"
    type: "coolant_temperature"
    values: [600.0]
  - name: "Burnup evolution"
    type: "burnup"
    values: [0.0]