# Geometry description for the uncontrolled PB2 Type 6 : BWR progression problem.
# This file describes the geometry of the pincell, including the fuel radius, gap radius, clad radius, and the number of fuel zones. 
# This information is used to build the pincell geometry.

PIN_GEOMETRY:
  fuel_radius: 0.52070
  gap_radius: 0.53213
  clad_radius: 0.61341
  pin_pitch: 1.6256
  self_shielding_option: "Santamarina"

ASSEMBLY_GEOMETRY:
  lattice_type: "Cartesian"
  reactor_type: "BWR"
  lattice_description:
    - ["ROD3", "ROD2", "ROD1", "ROD1", "ROD1", "ROD1", "ROD1", "ROD2"]
    - ["ROD2", "ROD1", "ROD5", "ROD1", "ROD1", "ROD1", "ROD5", "ROD1"]
    - ["ROD2", "ROD1", "ROD1", "ROD1", "ROD1", "ROD1", "ROD1", "ROD1"]
    - ["ROD2", "ROD1", "ROD1", "WROD", "ROD1", "ROD1", "ROD1", "ROD1"]
    - ["ROD2", "ROD5", "ROD1", "ROD1", "WROD", "ROD1", "ROD1", "ROD1"]
    - ["ROD2", "ROD1", "ROD1", "ROD1", "ROD1", "ROD1", "ROD5", "ROD1"]
    - ["ROD3", "ROD2", "ROD1", "ROD5", "ROD1", "ROD1", "ROD1", "ROD2"]
    - ["ROD4", "ROD3", "ROD2", "ROD2", "ROD2", "ROD2", "ROD2", "ROD3"]

  assembly_pitch: 15.24
  gap_wide: 0.9017 # Issue with this : need to center box taking into account gap_wide and gap_narrow : in BWR Progression Problems the Type 6 benchmark is not centered.
  gap_narrow: 0.42418
  channel_box_thickness: 0.254
  corner_inner_radius_of_curvature: 0.9652

  Gd_rod_ids: ["ROD5"]
  non_fuel_rod_ids: ["WROD"]

WATER_ROD_GEOMETRY:
  type: "circular"
  inner_radius : 0.67437
  outer_radius : 0.75057
  centers: [[7.04596, 6.56844], [8.67156, 8.19404]]


CONTROL_CROSS_GEOMETRY:
# control cross geometry retrieved from BWR Progression Problems documentation - C. Lawing, S. Palmtag, and M. Asgari (2021).
  center: "north-west"
  # control cross dimensions
  number_tubes_per_wing: 21
  blade_half_span: 12.3825 # length from cross center to tip, 
  blade_thickness: 0.79248 # total thickness of the blade, needs to be divided by 2 to split along axis of symmetry, -> done in glow builder
  tip_radius: 0.39624 # radius of the rounded tip of the blade, optional, if not specified, the blade will have a sharp tip
  central_structure_half_span: 1.98501 # length from center to begining of absorber tubes array, necessary in case of sheath around the tubes (GE-14 case)
  # sheath around absorber tubes of thickness "sheath_thickness" leaves a hollow structure for the tubes to be placed in :
  # the absorber cylinders (rabsorber_tube_inner_radius) are in a sheath annular region (absorber_tube_inner_radius<r<absorber_tube_outer_radius>) and surrounded by moderator (r>absorber_tube_outer_radius but within the sheath ie r<blade_thickness/2 - sheath_thickness)
  sheath_thickness: 0.14224 # thickness of the sheath around the absorber tubes, distance from inner blade moderator to outer assembly moderator.
  # absorber tube dimensions
  absorber_tube_outer_radius: 0.23876
  absorber_tube_inner_radius: 0.17526
  absorber_material : "ABS_B4C"
  sheath_material : "SHEATH_SS304"
  # I have computed tube_spacing and first_tube_offset (distance from center to first tube center) using the ge-14-00-C.serp file.
  tube_spacing: 0.4883456       # optional — override automatic computation
  first_tube_offset: 2.229183   # optional — override automatic computation