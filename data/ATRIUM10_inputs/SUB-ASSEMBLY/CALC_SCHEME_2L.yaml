# DRAGON Calculation Scheme for the AT10 3x3 sub-assembly test.
# Defines the sequence of calculation steps (self-shielding, flux)
# with their respective discretization options.
#
# This file is used as a test case and example for the automated creation of DRAGON calculation schemes in starterDD.
# Special case with a 2 level flux calculations scheme with mix duplication.
# R.Guasch
# Date : 18/03/2026 [created]

FLUX_CALCULATION_SCHEME:
  name: "AT10_3x3_2L_IC_MOC_with_mix_splitting"

  steps:
    # ------------------------------------------------------------------
    # Step 1: Self-shielding (SSH)
    #   - USS: module to treat the self-shielding problems
    #   - Resonance Spectrum Expansion method for resonance self-shielding (energy treatment)
    #   - IC spatial solution for the self-shielding calculation
    #   - TISO tracking (isotropic)
    #   - Santamarina radii for fuel zone subdivision
    #   - No azimuthal sectorization
    #   - Self-shielding mixes : by material numbering, subdivided into Santamarina zones
    # ------------------------------------------------------------------
    - name: "SSH"
      step_type: "self_shielding"
      mix_numbering_strategy: "by_material"
      self_shielding_module: "USS"
      self_shielding_method: "RSE"
      transport_correction: "NONE"
      spatial_method: "IC"
      tracking: "TISO"
      num_angles_2d: 8
      line_density: 25.0
      
      anisotropy_level: 4
      radial_scheme: "Santamarina"
      export_macros: true
      sectorization:
        enabled: false
    
    # ------------------------------------------------------------------
    # Step 2: Flux calculation (first level)
    #   - IC spatial solution for the flux calculation
    #   - TISO tracking (isotropic tracks, reflective boundary conditions)
    #   - Santamarina radii (same subdivision as SSH)
    #   - Windmill sectorization on coolant region
    #   - Material mixes numbering : by material numbering, subdivided into Santamarina zones
    # ------------------------------------------------------------------
    - name: "FLUXL1"
      step_type: "flux"
      mix_numbering_strategy: "by_material"
      spatial_method: "IC"
      tracking: "TISO"
      num_angles_2d: 8
      line_density: 25.0
      anisotropy_level: 4
      radial_scheme: "Santamarina"
      export_macros: True
      sectorization:
        enabled: True
        windmill: True
        fuel_pins:
          # UOX pins: 4 Santamarina fuel zones + gap + clad + coolant = 7 regions
          sectors: [1, 1, 1, 1, 1, 1, 8]
          angles:  [0, 0, 0, 0, 0, 0, 22.5]
    # ------------------------------------------------------------------
    # Step 3: Energy condensation -> condense from a fine (295g) to a coarse (26g) energy grid, in order to prepare for the second level of flux calculation. The condensation is done on the flux calculated in the first level, and the condensed cross sections are used in the second level.
    #   - Condensation method : edition between levels (use the flux calculated in the first level to condense the cross sections for the second level)
    - name: "Energy condensation"
      step_type: "edition_between_levels"
      number_of_macro_groups: 26
      energy_groups_bounds: [10,  14,  18,  26,  33,  40,  49,  56,  66, 84,
       150, 210, 241, 244, 247, 252, 255, 258, 261, 268, 273, 277, 281, 286, 291]
      SPH_correction: True
      max_SPH_group: 19
    # Step 4: Mix splitting -> split material mixtures into pin-based mixtures in order to prepare for the second level.
    - name: "Mix splitting"
      step_type: "mix_splitting"
      initial_mix_numbering_strategy: "by_material"
      target_mix_numbering_strategy: "by_pin"
      # The mix splitting step is used to split the material mixes after the first flux calculation, in order to prepare for the energy condensation step. This allows to have more accurate self-shielding and flux calculations in the second level, as the material mixes are more refined.

    # ------------------------------------------------------------------
    # Step 5: Flux calculation (second level)
    #   - MOC spatial solution for the flux calculation
    #   - TSPC tracking (cyclic tracks, specular boundary conditions)
    #   - Santamarina radii (same subdivision as SSH)
    #   - Windmill sectorization on coolant region
    # ------------------------------------------------------------------
    - name: "FLUXL2"
      step_type: "flux"
      mix_numbering_strategy: "by_pin"
      spatial_method: "MOC"
      tracking: "TSPC"
      num_angles_2d: 24
      line_density: 40.0
      polar_angles_quadrature: "GAUS"
      number_of_polar_angles: 4
      anisotropy_level: 4
      radial_scheme: "Santamarina"
      export_macros: False
      sectorization:
        enabled: True
        windmill: True
        fuel_pins:
          # UOX pins: 4 Santamarina fuel zones + gap + clad + coolant = 7 regions
          sectors: [1, 1, 1, 1, 1, 1, 8]
          angles:  [0, 0, 0, 0, 0, 0, 22.5]

# Yaml config file block to define the branch calculations :
# The branches can be used to tabulate Dragon5 cross sections in varying conditions
# Supported variations are : coolant density, fuel temperature, coolant temperature, & burnup (for depletion branches)

CALCULATION_BRANCHES:
  - name: "Coolant density variation"
    type: "coolant_density"
    # Reference : BWR Progression Problem for GE14, Table 2 "Coolant density as a function of void"
    #        0%            20%           40%         60%         80%
    values: [0.73669000, 0.59685660, 0.45702320, 0.31718980, 0.17735640] # in g/cm3
  - name: "Fuel temperature variation"
    type: "fuel_temperature"
    values: [750.0]   #[750.0, 900.0, 1500.0]
  - name: "Coolant temperature variation"
    type: "coolant_temperature"
    values: [559.0] #[550.0, 559.0, 600.0]

# config file block to specify what outputs are to be generated by the calculation scheme. This is used to automate the creation of calls to the EDI and COMPO modules.
CALCULATION_OUTPUTS:
  - name: "EDIHOM_COND"
    comment: "Condensed, homogenized over all fuel cells"
    spatial_integration_mode : "FUEL"
    isotopes: ["U234", "U235", "U236", "U238", "Pu239", "Pu240", "Pu241", "Pu242", "Gd155", "Gd157", "Xe135", "Sm149"]
    energy_bounds : [] # implicit min and max bounds : condense over the whole energy range
    state_points: "ALL"
  
  - name: "EDIHOM_295"
    comment: "Homogenized over all materials"
    isotopes: ["U238"] # 
    spatial_intergation_mode : "ALL"
    energy_bounds : None # None : no condensation, keep all energy groups
    state_points: 
      coolant_density: [0.73669000] #[0.73669000, 0.59685660, 0.45702320, 0.31718980, 0.17735640]
      fuel_temperature: [750.0] #[750.0, 900.0, 1500.0]
      coolant_temperature: [559.0] # [550.0, 559.0, 600.0]
      
  - name: "EDIR_2G"
    comment: "Condensed to 2g, per pin homogenization"
    isotopes: ["U234", "U235", "U236", "U238", "Gd155", "Gd157"]
    spatial_integration_mode: "by_pin"
    energy_bounds: [0.625] # cut the properties into 2 groups : thermal below 0.625 eV and fast above,
    state_points: 
      coolant_density: [0.73669000]
      fuel_temperature: [750.0]
      coolant_temperature: [559.0]

  - name: "U238_295"
    comment: "U238, 295g, homogenized over all fuel cells"
    isotopes: ["U238"]
    spatial_integration_mode: "FUEL"
    energy_bounds: "None"
    state_points: 
      coolant_density: [0.73669000]
      fuel_temperature: [750.0]
      coolant_temperature: [559.0]
    
